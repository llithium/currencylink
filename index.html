<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="A simple currency converter that allows currency conversion and viewing current and historical exchange rates"
    />
    <link rel="canonical" href="https://currencylink.netlify.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0c0a09" />
    <script>
      (() => {
        const saved = localStorage.getItem("currencylink-theme");
        const theme = saved === "light" || saved === "dark"
          ? saved
          : matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.querySelector('meta[name="theme-color"]').content =
          theme === "dark" ? "#0c0a09" : "#f7f4ef";
      })();
    </script>

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Currency Link" />
    <meta property="og:title" content="Currency Link — Currency Converter & Exchange Rates" />
    <meta
      property="og:description"
      content="A simple currency converter that allows currency conversion and viewing current and historical exchange rates"
    />
    <meta property="og:url" content="https://currencylink.netlify.app/" />
    <meta property="og:image" content="https://currencylink.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Currency Link — convert currencies and view exchange rates" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Currency Link — Currency Converter & Exchange Rates" />
    <meta
      name="twitter:description"
      content="A simple currency converter that allows currency conversion and viewing current and historical exchange rates"
    />
    <meta name="twitter:image" content="https://currencylink.netlify.app/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Currency Link — Currency Converter & Exchange Rates</title>
  </head>

  <body>
    <div class="h-svh" id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
